<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Annotation Tool{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <div class="min-h-screen flex">
<aside class="hidden md:flex md:w-72 flex-col border-r border-white/20 bg-white/70 backdrop-blur-xl shadow-sm">
                <div class="px-6 py-8">
                    <div class="flex items-center gap-3">
                        <div class="flex h-12 w-12 items-center justify-center rounded-3xl bg-gradient-to-br from-[#00C9A7] to-[#845EF7] text-white text-xl font-extrabold shadow-sm">A</div>
                        <div>
                            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">Annotation Tool</p>
                            <h1 class="text-xl font-semibold text-slate-900">Dashboard</h1>
                        </div>
                    </div>
                </div>
                <nav class="space-y-2 px-6 pb-6">
                    <a href="/projects" class="block rounded-3xl px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-[#00C9A7]/10 hover:text-[#047857]">Projects</a>
                    <a href="/user" class="block rounded-3xl px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-[#00C9A7]/10 hover:text-[#047857]">User</a>
                    <a href="/logout" onclick="return confirm('Are you sure you want to log out?')" class="block rounded-3xl px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-[#00C9A7]/10 hover:text-[#047857]">Logout</a>
            </nav>
        </aside>

        <main class="flex-1">
            <div class="md:hidden border-b border-slate-200 bg-white">
                <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6">
                    <div>
                        <p class="text-xs uppercase tracking-[0.24em] text-slate-500">Annotation Tool</p>
                        <h1 class="text-lg font-semibold text-slate-900">Dashboard</h1>
                    </div>
                    <a href="/logout" onclick="return confirm('Are you sure you want to log out?')" class="rounded-3xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-slate-800">Logout</a>
                </div>
            </div>

            <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
                <div class="page-shell glass-panel">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </main>
    </div>
</body>
</html>
