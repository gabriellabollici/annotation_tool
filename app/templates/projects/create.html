{% extends "base.html" %}
{% block title %}Create Project - Annotation Tool{% endblock %}
{% block content %}
<div class="space-y-8">
    <div class="rounded-[1.75rem] bg-white/90 p-8 shadow-sm ring-1 ring-slate-200">
        <p class="text-sm font-semibold uppercase tracking-[0.24em] text-[#845EF7]">Create Project</p>
        <h2 class="mt-3 text-3xl font-semibold text-slate-900">New annotation project</h2>
        <form method="post" action="/projects" class="mt-8 space-y-5">
            <div>
                <label for="name" class="block text-sm font-semibold text-slate-700">Project Name</label>
                <input type="text" id="name" name="name" placeholder="Enter project name" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/15">
            </div>
            <button type="submit" class="inline-flex w-full items-center justify-center rounded-full bg-gradient-to-r from-[#00C9A7] to-[#845EF7] px-5 py-3 text-sm font-semibold text-white shadow-sm">Create Project</button>
        </form>
    </div>
    <a href="/projects" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-700 transition hover:text-[#00C9A7]">← Back to Projects</a>
</div>
{% endblock %}
