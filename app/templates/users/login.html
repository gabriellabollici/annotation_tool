{% extends "base.html" %}
{% block title %}Login - Annotation Tool{% endblock %}
{% block content %}
<div class="space-y-8">
    {% if error %}
    <div class="rounded-3xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800">{{ error }}</div>
    {% endif %}
    <div class="grid gap-6 lg:grid-cols-2">
        <section class="rounded-[1.75rem] bg-white/90 p-8 shadow-sm ring-1 ring-slate-200">
            <p class="text-sm font-semibold uppercase tracking-[0.24em] text-[#845EF7]">Login as User</p>
            <h2 class="mt-3 text-2xl font-semibold text-slate-900">User access</h2>
            <form method="post" action="/login/user" class="mt-6 space-y-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/15">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/15">
                </div>
                <button type="submit" class="inline-flex w-full items-center justify-center rounded-full bg-gradient-to-r from-[#00C9A7] to-[#845EF7] px-5 py-3 text-sm font-semibold text-white shadow-sm">Login as User</button>
            </form>
        </section>
        <section class="rounded-[1.75rem] bg-white/90 p-8 shadow-sm ring-1 ring-slate-200">
            <p class="text-sm font-semibold uppercase tracking-[0.24em] text-[#845EF7]">Login as Admin</p>
            <h2 class="mt-3 text-2xl font-semibold text-slate-900">Admin access</h2>
            <form method="post" action="/login/admin" class="mt-6 space-y-5">
                <div>
                    <label for="admin_username" class="block text-sm font-semibold text-slate-700">Admin username</label>
                    <input type="text" id="admin_username" name="username" placeholder="Enter admin username" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/15">
                </div>
                <div>
                    <label for="admin_password" class="block text-sm font-semibold text-slate-700">Admin password</label>
                    <input type="password" id="admin_password" name="admin_password" placeholder="Enter admin password" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/15">
                </div>
                <button type="submit" class="inline-flex w-full items-center justify-center rounded-full bg-gradient-to-r from-[#00C9A7] to-[#845EF7] px-5 py-3 text-sm font-semibold text-white shadow-sm">Login as Admin</button>
            </form>
        </section>
    </div>
</div>
{% endblock %}
