{% extends "base.html" %}
{% block title %}Create New User - Annotation Tool{% endblock %}
{% block content %}
<div class="space-y-8">
    <div class="rounded-[1.75rem] bg-white/90 p-8 shadow-sm ring-1 ring-slate-200">
        <p class="text-sm font-semibold uppercase tracking-[0.24em] text-[#845EF7]">Create New User</p>
        <h2 class="mt-3 text-3xl font-semibold text-slate-900">Add a team member</h2>
        {% if error %}
        <div class="mt-4 rounded-3xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800">{{ error }}</div>
        {% endif %}
        <form method="post" action="/register" class="mt-8 space-y-5">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter a username" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/15">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter a password" required class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 focus:border-[#00C9A7] focus:ring-4 focus:ring-[#00C9A7]/15">
            </div>
            <label class="flex items-center gap-3 text-sm text-slate-700">
                <input type="checkbox" id="is_admin" name="is_admin" class="h-4 w-4 rounded border-slate-300 text-[#00C9A7] focus:ring-[#00C9A7]">
                Grant admin privileges to this user
            </label>
            <button type="submit" class="inline-flex w-full items-center justify-center rounded-full bg-gradient-to-r from-[#00C9A7] to-[#845EF7] px-5 py-3 text-sm font-semibold text-white shadow-sm">Create User</button>
        </form>
    </div>
    <a href="/user" class="inline-flex items-center gap-2 text-sm font-semibold text-slate-700 transition hover:text-[#00C9A7]">← Back to User Settings</a>
</div>
{% endblock %}
